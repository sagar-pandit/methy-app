# Kubernetes Deployments — Methy Microservices
# One Deployment per service; adjust replica counts for production.
# Images are pulled from the registry defined per service.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: methy-gateway
  namespace: methy
  labels:
    app: methy-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: methy-gateway
  template:
    metadata:
      labels:
        app: methy-gateway
    spec:
      containers:
        - name: methy-gateway
          image: methy-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10


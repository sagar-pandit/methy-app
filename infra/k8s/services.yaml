# Kubernetes Services — Methy Microservices
# ClusterIP for internal communication; ports match container 8080.

---
apiVersion: v1
kind: Service
metadata:
  name: methy-gateway
  namespace: methy
spec:
  selector:
    app: methy-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: methy-user
  namespace: methy
spec:
  selector:
    app: methy-user
  ports:

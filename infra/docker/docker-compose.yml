networks:
  methy-network:
    driver: bridge

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: '${SA_PASSWORD:-YourStrong!Passw0rd}'
      ACCEPT_EULA: 'Y'
      MSSQL_PID: Developer
    ports:
      - '1433:1433'
    networks:
      - methy-network
    healthcheck:
      test:
        [
          'CMD',
          '/opt/mssql-tools18/bin/sqlcmd',
          '-S',
          'localhost',
          '-U',
          'sa',
          '-P',
          '${SA_PASSWORD:-YourStrong!Passw0rd}',
          '-Q',
          'SELECT 1',
          '-C',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - methy-network
    volumes:
      - ./sql/init.sql:/init.sql:ro
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        /opt/mssql-tools18/bin/sqlcmd -S sql-server -U sa -P "$${SA_PASSWORD:-YourStrong!Passw0rd}" -C -i /init.sql
        echo "Database initialization complete."
    environment:
      SA_PASSWORD: '${SA_PASSWORD:-YourStrong!Passw0rd}'
    restart: 'no'

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: '${RABBITMQ_DEFAULT_USER:-guest}'
      RABBITMQ_DEFAULT_PASS: '${RABBITMQ_DEFAULT_PASS:-guest}'
      RABBITMQ_DEFAULT_VHOST: methy
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - methy-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro

  # ─── Microservices ─────────────────────────────────────────────────────────

  methy-gateway:
    build:
      context: ../../backend
      dockerfile: src/Methy.Gateway/Dockerfile
    image: methy-gateway:local
    ports:
      - '5000:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  methy-user:
    build:
      context: ../../backend
      dockerfile: src/Methy.Services.User/Dockerfile
    image: methy-user:local
    ports:
      - '5001:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  methy-restaurant:
    build:
      context: ../../backend
      dockerfile: src/Methy.Services.Restaurant/Dockerfile
    image: methy-restaurant:local
    ports:
      - '5002:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  methy-order:
    build:
      context: ../../backend
      dockerfile: src/Methy.Services.Order/Dockerfile
    image: methy-order:local
    ports:
      - '5003:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  methy-payment:
    build:
      context: ../../backend
      dockerfile: src/Methy.Services.Payment/Dockerfile
    image: methy-payment:local
    ports:
      - '5004:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  methy-notification:
    build:
      context: ../../backend
      dockerfile: src/Methy.Services.Notification/Dockerfile
    image: methy-notification:local
    ports:
      - '5005:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  methy-delivery:
    build:
      context: ../../backend
      dockerfile: src/Methy.Services.Delivery/Dockerfile
    image: methy-delivery:local
    ports:
      - '5006:8080'
    networks:
      - methy-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ['CMD-SHELL', 'dotnet --info > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # ─── Observability (profile: observability) ────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    ports:
      - '9090:9090'
    networks:
      - methy-network
    volumes:
      - ../../infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    ports:
      - '3000:3000'
    networks:
      - methy-network
    volumes:
      - ../../infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles:
      - observability
    ports:
      - '16686:16686'
    networks:
      - methy-network

# docker-compose.override.yml — Development overrides
# Applied automatically when running: docker compose up
# Provides dev-friendly env vars for local development.
# NOTE: Port mappings are defined in docker-compose.yml only (no duplicates).

services:
  methy-gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: 'Server=sql-server,1433;Database=methy;User Id=sa;Password=${SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=true'
      RabbitMQ__Host: rabbitmq

  methy-user:

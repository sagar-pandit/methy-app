openapi: "3.0.3"
info:
  title: Methy Delivery Service
  description: |
    Manages delivery assignments, real-time driver tracking, and delivery status
    updates for the Methy platform. Integrates with the Order Service via RabbitMQ events.
    Full API contract will be defined in Phase 7 (Delivery Tracking).
  version: "0.1.0"
  contact:
    name: Sagar Pandit
servers:
  - url: http://localhost:5006
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the Delivery Service. Used by Docker and Kubernetes health probes.
      operationId: getDeliveryServiceHealth
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: Healthy

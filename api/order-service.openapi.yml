openapi: "3.0.3"
info:
  title: Methy Order Service
  description: |
    Manages the full order lifecycle for the Methy platform: cart management,
    order placement, order status tracking, and order history.
    Full API contract will be defined in Phase 4 (Order Placement & Tracking).
  version: "0.1.0"
  contact:
    name: Sagar Pandit
servers:
  - url: http://localhost:5003
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the Order Service. Used by Docker and Kubernetes health probes.
      operationId: getOrderServiceHealth
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: Healthy

openapi: "3.0.3"
info:
  title: Methy Payment Service
  description: |
    Processes payments for Methy orders using mock payment mode (no real gateway in Phase 1).
    Handles payment initiation, status updates, and refunds.
    Full API contract will be defined in Phase 5 (Payment Processing).
  version: "0.1.0"
  contact:
    name: Sagar Pandit
servers:
  - url: http://localhost:5004
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the Payment Service. Used by Docker and Kubernetes health probes.
      operationId: getPaymentServiceHealth
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: Healthy

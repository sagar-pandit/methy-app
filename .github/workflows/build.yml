name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/Methy.sln

      - name: Build
        run: dotnet build backend/Methy.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test backend/Methy.sln
          --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory TestResults/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/

  frontend:
    name: Angular Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/methy-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/methy-app

      - name: Lint
        run: npm run lint
        working-directory: frontend/methy-app

      - name: Build
        run: npm run build -- --configuration production
        working-directory: frontend/methy-app

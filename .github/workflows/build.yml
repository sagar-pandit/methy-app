name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dotnet-build:
    name: .NET Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/Methy.slnx

      - name: Build
        run: dotnet build backend/Methy.slnx --no-restore -c Release

  dotnet-test:
    name: .NET Test
    runs-on: ubuntu-latest
    needs: dotnet-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/Methy.slnx

      - name: Build
        run: dotnet build backend/Methy.slnx --no-restore -c Release

      - name: Test
        run: >
          dotnet test backend/Methy.slnx
          --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory TestResults/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/

  angular-build:
    name: Angular Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/methy-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/methy-app

      - name: Build
        run: npm run build -- --configuration production
        working-directory: frontend/methy-app

  angular-lint:
    name: Angular Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/methy-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/methy-app

      - name: Lint
        run: npm run lint
        working-directory: frontend/methy-app

name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or screenshots.
    validations:
      required: true

  - type: dropdown
    id: service
    attributes:
      label: Affected service
      options:
        - Gateway
        - User Service
        - Restaurant Service
        - Order Service
        - Payment Service
        - Notification Service
        - Delivery Service
        - Frontend (Angular)
        - Infrastructure / Docker
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. local Docker, staging, production
    validations:
      required: true
